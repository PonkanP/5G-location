name: Mobile5GLocator
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

targets:
  Mobile5GLocator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ios
    info:
      path: ios/Info.plist
      properties:
        CFBundleDisplayName: "5G Location"
        # Required: reason string shown in the location permission dialog
        NSLocationWhenInUseUsageDescription: "5Gネットワーク測位で現在地を取得します。GPSは使用しません。"
        # KEY: default to Approximate Location (reducedAccuracy).
        # This is the only iOS mechanism that definitively prevents GPS use.
        # Users will see "Allow Approximate Location" in the permission dialog.
        NSLocationDefaultAccuracyReduced: true
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: com.yourname.hmg5g
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
